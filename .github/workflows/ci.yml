name: CI — Lint, Test & Build

on:
  pull_request:
    branches:
      - dev
      - staging
      - main
  push:
    branches:
      - dev
  workflow_dispatch:

jobs:
  ci:
    name: Lint → Test → Build
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: energy_iq_user
          POSTGRES_PASSWORD: ci_password
          POSTGRES_DB: energy_iq_db
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U energy_iq_user -d energy_iq_db"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm lint

      - name: Run tests
        env:
          NODE_ENV: test
          PORT: 3330
          HOST: localhost
          CLIENT_URL: http://localhost:3000
          DATABASE_HOST: localhost
          DATABASE_PORT: 5432
          DATABASE_USER: energy_iq_user
          DATABASE_PASSWORD: ci_password
          DATABASE_NAME: energy_iq_db
          DATABASE_SYNC: true
          DATABASE_LOGGING: false
          DATABASE_SSL: false
          REDIS_HOST: localhost
          REDIS_PORT: 6379
          RESEND_API_KEY: test_key
          JWT_ACCESS_SECRET: ci-test-access-secret-at-least-32-chars-long
          JWT_ACCESS_EXPIRES_IN: 15m
          JWT_REFRESH_SECRET: ci-test-refresh-secret-at-least-32-chars-long
          JWT_REFRESH_EXPIRES_IN: 7d
          CORS_ORIGIN: "*"
          SWAGGER_ENABLED: false
        run: pnpm test

      - name: Build
        run: pnpm build

  security-scan:
    name: Security Scan
    runs-on: ubuntu-latest
    needs: ci

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Audit dependencies
        run: pnpm audit --audit-level=high
        continue-on-error: true

      - name: Run Trivy vulnerability scan
        uses: aquasecurity/trivy-action@0.35.0
        with:
          scan-type: fs
          scan-ref: .
          severity: HIGH,CRITICAL
          exit-code: 1
          ignore-unfixed: true