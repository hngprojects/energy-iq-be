name: EnergyIQ Backend PR Quality Gate

on:
  pull_request:
    branches:
      - dev
      - staging
      - main
  workflow_dispatch:

jobs:
  energyiq-backend-quality-gate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run lint, tests, and build
        run: pnpm validate
