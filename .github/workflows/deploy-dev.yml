name: Deploy to Dev

on:
  push:
    branches:
      - dev
  workflow_dispatch:

jobs:
  deploy:
    name: Deploy to Dev Server
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.DEV_SSH_HOST }}
          username: ${{ secrets.DEV_SSH_USER }}
          key: ${{ secrets.DEV_SSH_KEY }}
          script: |
            set -e
            cd ~/energy-iq-be

            git pull origin dev

            export NVM_DIR="$HOME/.nvm"
            [ -s "$NVM_DIR/nvm.sh" ] && \. "$NVM_DIR/nvm.sh"

            pnpm install --frozen-lockfile
            pnpm migration:run
            pnpm build

            pm2 reload energy-iq-dev --update-env || pm2 start dist/main.js --name energy-iq-dev
            pm2 save

      - name: Health check
        run: |
          sleep 10
          curl --fail http://${{ secrets.DEV_SSH_HOST }}/health || exit 1
